    AssetPlacement:
      type: object
      additionalProperties: false
      dependentRequired:
        x: [y]
        y: [x]
      description: Normalized coordinates and bounds are 0..1. Pixel values are validated integers. New placements default to normalized when coordinateSpace is omitted.
      properties:
        coordinateSpace:
          type: string
          enum: [normalized, pixels]
        x:
          type: number
        y:
          type: number
        fitMode:
          type: string
          enum: [contain, cover, keep-transform]
        scale:
          type: number
          minimum: 0.05
          maximum: 10
          description: Absolute multiplier relative to the selected fit baseline; update patches preserve the prior value when omitted.
        maxWidth:
          type: number
          exclusiveMinimum: 0
        maxHeight:
          type: number
          exclusiveMinimum: 0
        clippingMask:
          type: boolean
        nonGenerativeMask:
          type: boolean
        dropShadow:
          type: boolean
        outerGlow:
          type: boolean
      allOf:
        - if:
            properties:
              coordinateSpace:
                const: pixels
            required: [coordinateSpace]
          then:
            properties:
              x:
                type: integer
                minimum: -16384
                maximum: 16384
              y:
                type: integer
                minimum: -16384
                maximum: 16384
              maxWidth:
                type: integer
                exclusiveMinimum: 0
                maximum: 16384
              maxHeight:
                type: integer
                exclusiveMinimum: 0
                maximum: 16384
          else:
            properties:
              x:
                type: number
                minimum: 0
                maximum: 1
              y:
                type: number
                minimum: 0
                maximum: 1
              maxWidth:
                type: number
                exclusiveMinimum: 0
                maximum: 1
              maxHeight:
                type: number
                exclusiveMinimum: 0
                maximum: 1

    UpdateAssetPlacement:
      type: object
      additionalProperties: false
      dependentRequired:
        x: [y]
        y: [x]
      description: Patch values inherit the manifest coordinate space when omitted and must form one valid normalized or pixel-space set. Other omitted fields are preserved.
      properties:
        coordinateSpace:
          type: string
          enum: [normalized, pixels]
        x:
          type: number
        y:
          type: number
        fitMode:
          type: string
          enum: [contain, cover, keep-transform]
        scale:
          type: number
          minimum: 0.05
          maximum: 10
          description: Absolute multiplier relative to the selected fit baseline; the prior value is preserved when omitted.
        maxWidth:
          type: number
          exclusiveMinimum: 0
        maxHeight:
          type: number
          exclusiveMinimum: 0
        clippingMask:
          type: boolean
        nonGenerativeMask:
          type: boolean
        dropShadow:
          type: boolean
        outerGlow:
          type: boolean
      allOf:
        - if:
            properties:
              coordinateSpace:
                const: normalized
            required: [coordinateSpace]
          then:
            properties:
              x: { type: number, minimum: 0, maximum: 1 }
              y: { type: number, minimum: 0, maximum: 1 }
              maxWidth: { type: number, exclusiveMinimum: 0, maximum: 1 }
              maxHeight: { type: number, exclusiveMinimum: 0, maximum: 1 }
        - if:
            properties:
              coordinateSpace:
                const: pixels
            required: [coordinateSpace]
          then:
            properties:
              x: { type: integer, minimum: -16384, maximum: 16384 }
              y: { type: integer, minimum: -16384, maximum: 16384 }
              maxWidth: { type: integer, minimum: 1, maximum: 16384 }
              maxHeight: { type: integer, minimum: 1, maximum: 16384 }
        - if:
            not:
              required: [coordinateSpace]
          then:
            anyOf:
              - properties:
                  x: { type: number, minimum: 0, maximum: 1 }
                  y: { type: number, minimum: 0, maximum: 1 }
                  maxWidth: { type: number, exclusiveMinimum: 0, maximum: 1 }
                  maxHeight: { type: number, exclusiveMinimum: 0, maximum: 1 }
              - properties:
                  x: { type: integer, minimum: -16384, maximum: 16384 }
                  y: { type: integer, minimum: -16384, maximum: 16384 }
                  maxWidth: { type: integer, minimum: 1, maximum: 16384 }
                  maxHeight: { type: integer, minimum: 1, maximum: 16384 }


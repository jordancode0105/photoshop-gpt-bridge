    CreateMatchCardRequest:
      type: object
      additionalProperties: false
      description: Output PSD and PNG names must not reuse the template or any supplied asset filename.
      required:
        - briefName
        - canvas
        - templateBackground
        - style
        - assets
        - text
        - outputPsdName
        - outputPreviewName
        - outputManifestName
      properties:
        briefName:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '^[^\x00]*$'
        canvas:
          $ref: "#/components/schemas/MatchCardCanvas"
        templateBackground:
          $ref: "#/components/schemas/TemplateBackground"
        style:
          $ref: "#/components/schemas/CreateMatchCardStyle"
        assets:
          $ref: "#/components/schemas/CreateMatchCardAssets"
        text:
          $ref: "#/components/schemas/MatchCardText"
        placements:
          $ref: "#/components/schemas/AssetPlacements"
        artDirection:
          $ref: "#/components/schemas/EccwArtDirection"
        outputPsdName:
          $ref: "#/components/schemas/PsdOutputFileName"
        outputPreviewName:
          $ref: "#/components/schemas/PngOutputFileName"
        outputManifestName:
          $ref: "#/components/schemas/ManifestFileName"
      allOf:
        - if:
            properties:
              style:
                properties:
                  layoutPreset:
                    enum: [two-competitor-title-center, two-competitor-title-lower, eccw-two-competitor-panel-template]
          then:
            properties:
              assets:
                required: [competitorLeft, competitorRight, showLogo]
        - if:
            properties:
              style:
                properties:
                  layoutPreset:
                    const: three-competitor-title-center
          then:
            properties:
              assets:
                required: [competitorLeft, competitorRight, competitorCenter, showLogo]
        - if:
            properties:
              style:
                properties:
                  layoutPreset:
                    const: single-competitor-title-side
          then:
            properties:
              assets:
                required: [competitorCenter, showLogo]
        - if:
            properties:
              style:
                properties:
                  layoutPreset:
                    const: eccw-two-competitor-panel-template
          then:
            properties:
              canvas:
                properties:
                  width:
                    const: 1920
                  height:
                    const: 1080
              templateBackground:
                properties:
                  fileName:
                    const: ECCW_JordanSinner_vs_EddieSlayer_template_bg_v1.png
              assets:
                required: [competitorLeft, competitorRight, showLogo]
                maxProperties: 3
              text:
                required: [competitorLeftName, competitorRightName, matchTitle, date]
                maxProperties: 4
                properties:
                  matchTitle:
                    const: VS
      example:
        briefName: ECCW Breakker vs Rage
        canvas:
          width: 1920
          height: 1080
          resolution: 72
        templateBackground:
          fileName: ECCW_Breakker_vs_Rage_template_bg_v1.png
          fitMode: cover
        style:
          description: premium red black white wrestling broadcast presentation
          primaryColor: { red: 190, green: 0, blue: 28 }
          secondaryColor: { red: 8, green: 8, blue: 10 }
          accentColor: { red: 245, green: 245, blue: 242 }
          metallicColor: { red: 142, green: 148, blue: 154 }
          layoutPreset: two-competitor-title-center
        assets:
          showLogo: ECCW.png
          competitorLeft: Breakker.png
          competitorRight: Rage.png
          beltImage: IC_Title.png
          venueLogo: MGM.png
        text:
          championship: INTERCONTINENTAL CHAMPIONSHIP
          competitorLeftName: BREAKKER
          competitorRightName: RAGE
          matchTitle: "BREAKKER\nRAGE"
          stipulation: FIRST TO FIVE
          date: SUNDAY · JULY 20
          time: 2 PM EST | 1 PM CST | 7 PM GMT
          venue: LIVE! FROM THE MGM GRAND ARENA IN LAS VEGAS
        outputPsdName: ECCW_Breakker_vs_Rage_v1.psd
        outputPreviewName: ECCW_Breakker_vs_Rage_v1.png
        outputManifestName: ECCW_Breakker_vs_Rage_v1.matchcard.json

    UpdateMatchCardChanges:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        templateBackground:
          $ref: "#/components/schemas/TemplateBackground"
        style:
          $ref: "#/components/schemas/UpdateMatchCardStyle"

openapi: 3.1.0
info:
  title: Private Photoshop Bridge
  version: 0.3.0
  description: >
    Queues narrowly scoped Photoshop jobs for a local agent. Inspection and
    previews plus match-card inventory and planning are read-only. All write
    operations require local approval and preserve prior documents and outputs.
servers:
  - url: https://photoshop-gpt-bridge.onrender.com
security:
  - bearerAuth: []
paths:
  /api/jobs/inspect-document:
    post:
      operationId: inspectPhotoshopDocument
      summary: Inspect the open Photoshop document and its complete layer tree
      description: >
        Queue a read-only inspection. Text layers include safe textInfo metadata
        and a content-replacement safety flag. Poll getPhotoshopJobStatus until
        the job succeeds or fails.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                documentName:
                  type: string
                  description: Optional exact Photoshop document title. Omit to use the active document.
      responses:
        "202":
          description: Inspection queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/replace-smart-object:
    post:
      operationId: replacePhotoshopSmartObject
      summary: Replace a Smart Object, save a new PSD copy, and export a PNG preview
      description: >
        Queue a consequential write operation. Use a layerId returned by inspection
        whenever possible. The user must approve the operation in Photoshop.
        Never choose an outputPsdName that matches the original document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - replacementFileName
                - outputPsdName
                - outputPreviewName
              properties:
                documentName:
                  type: string
                  description: Optional exact document title. Omit to use the active document.
                layerId:
                  type: integer
                  minimum: 1
                  description: Preferred stable layer ID returned by document inspection.
                layerName:
                  type: string
                  description: Exact layer name; use only when layerId is unavailable.
                replacementFileName:
                  type: string
                  description: >
                    File name only, not a path. The file must be inside the
                    user-approved Photoshop Bridge working folder.
                fitMode:
                  type: string
                  enum: [contain, cover, keep-transform]
                  default: contain
                outputPsdName:
                  type: string
                  pattern: '^[^\\/]+\.psd$'
                  description: New output file name. Never overwrite the original.
                outputPreviewName:
                  type: string
                  pattern: '^[^\\/]+\.png$'
      responses:
        "202":
          description: Write operation queued for local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/recolor-layers:
    post:
      operationId: recolorPhotoshopLayers
      summary: Apply safe Color Overlay effects and save new PSD and PNG files
      description: >
        Recolor Photoshop layers using exact IDs from a fresh inspection.
        This write operation preserves the original, requires local approval,
        saves a new layered PSD and PNG preview, and requires job-status polling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - edits
                - outputPsdName
                - outputPreviewName
              properties:
                documentName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Optional exact open document name. Omit to use the active document.
                edits:
                  type: array
                  minItems: 1
                  maxItems: 25
                  description: Each layerId must be unique within this request.
                  items:
                    type: object
                    additionalProperties: false
                    required: [layerId, color]
                    properties:
                      layerId:
                        type: integer
                        minimum: 1
                        description: Exact numeric layer ID from a fresh inspection.
                      color:
                        type: object
                        additionalProperties: false
                        required: [red, green, blue]
                        properties:
                          red:
                            type: integer
                            minimum: 0
                            maximum: 255
                          green:
                            type: integer
                            minimum: 0
                            maximum: 255
                          blue:
                            type: integer
                            minimum: 0
                            maximum: 255
                      opacity:
                        type: number
                        minimum: 0
                        maximum: 100
                        default: 100
                      blendMode:
                        type: string
                        enum: [normal, color, multiply, overlay, screen]
                        default: normal
                outputPsdName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^[^\\/]+\.psd$'
                  description: Plain, versioned .psd file name. Existing files are never overwritten.
                outputPreviewName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^[^\\/]+\.png$'
                  description: Plain, versioned .png file name. Existing files are never overwritten.
            example:
              documentName: RWCMatchCard.psd
              edits:
                - layerId: 123
                  color:
                    red: 190
                    green: 20
                    blue: 25
                  opacity: 100
                  blendMode: color
              outputPsdName: RWCMatchCard_ECCW_Recolor_v1.psd
              outputPreviewName: RWCMatchCard_ECCW_Recolor_v1.png
      responses:
        "202":
          description: Recolor operation queued for local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/update-text-layers:
    post:
      operationId: updatePhotoshopTextLayers
      summary: Replace content in uniformly styled Photoshop text layers
      description: >
        Use exact text-layer IDs from a fresh inspection for this consequential
        write. The original is preserved and local approval is required. After
        queueing, stop and wait for approval; only then call getPhotoshopJobStatus.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - edits
                - outputPsdName
                - outputPreviewName
              properties:
                documentName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Optional exact open document name. Omit to use the active document.
                edits:
                  type: array
                  minItems: 1
                  maxItems: 25
                  description: Unique fresh text-layer IDs; total replacement text is limited to 20,000 characters.
                  items:
                    type: object
                    additionalProperties: false
                    required: [layerId, text]
                    properties:
                      layerId:
                        type: integer
                        minimum: 1
                        description: Exact numeric text-layer ID from a fresh inspection.
                      text:
                        type: string
                        maxLength: 4000
                        description: Replacement content. Empty text is allowed; null bytes are rejected.
                outputPsdName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+\.psd$'
                  description: Plain versioned PSD name distinct from the original; no paths, traversal, or overwrite.
                outputPreviewName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+\.png$'
                  description: Plain versioned PNG name; no paths, drive letters, traversal, or overwrite.
            example:
              documentName: RWCMatchCard.psd
              edits:
                - layerId: 123
                  text: NEW TEXT
              outputPsdName: RWCMatchCard_Text_v1.psd
              outputPreviewName: RWCMatchCard_Text_v1.png
      responses:
        "202":
          description: Text update queued; stop and wait for local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/export-document-preview:
    post:
      operationId: exportPhotoshopDocumentPreview
      summary: Export a local PNG preview of an open Photoshop document
      description: >
        Read-only. Export a flattened PNG locally for review or upload, then
        check getPhotoshopJobStatus. The source stays unchanged; use an exact
        open document name or omit it for the active document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [outputPreviewName]
              properties:
                documentName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Optional exact open document name. Omit to use the active document.
                outputPreviewName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+\.png$'
                  description: Plain versioned PNG name in the local working folder; existing files are never overwritten.
            example:
              documentName: RWCMatchCard.psd
              outputPreviewName: RWCMatchCard_preview_v1.png
      responses:
        "202":
          description: Read-only document preview queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/export-layer-previews:
    post:
      operationId: exportPhotoshopLayerPreviews
      summary: Export local PNG previews for exact Photoshop layer IDs
      description: >
        Read-only. Use exact IDs from a fresh inspection to export isolated PNGs
        or one contact sheet locally for review or upload. Check
        getPhotoshopJobStatus for paths; the source stays unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [layerIds, mode, baseOutputName]
              properties:
                documentName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Optional exact open document name. Omit to use the active document.
                layerIds:
                  type: array
                  minItems: 1
                  maxItems: 12
                  uniqueItems: true
                  description: Unique exact numeric layer IDs from a fresh inspection.
                  items:
                    type: integer
                    minimum: 1
                mode:
                  type: string
                  enum: [isolated-transparent, isolated-on-canvas, contact-sheet]
                marginPx:
                  type: integer
                  minimum: 0
                  maximum: 400
                  default: 40
                baseOutputName:
                  type: string
                  minLength: 1
                  maxLength: 200
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+$'
                  description: Plain versioned filename stem; deterministic PNG names are created locally.
            example:
              documentName: RWCMatchCard.psd
              layerIds: [31, 53, 90]
              mode: isolated-on-canvas
              marginPx: 40
              baseOutputName: candidate_layers_v1
      responses:
        "202":
          description: Read-only layer previews queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/rename-layers:
    post:
      operationId: renamePhotoshopLayers
      summary: Rename exact Photoshop layers in a new PSD copy
      description: >
        Write operation. Present old and proposed names first, use exact IDs from
        a fresh inspection, then queue and wait for local approval. Check
        getPhotoshopJobStatus afterward; PSD and preview files are saved locally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [edits, outputPsdName, outputPreviewName]
              properties:
                documentName:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Optional exact open document name. Omit to use the active document.
                edits:
                  type: array
                  minItems: 1
                  maxItems: 50
                  description: Rename proposals with unique exact layer IDs from a fresh inspection.
                  items:
                    type: object
                    additionalProperties: false
                    required: [layerId, newName]
                    properties:
                      layerId:
                        type: integer
                        minimum: 1
                      newName:
                        type: string
                        minLength: 1
                        maxLength: 255
                        description: Exact new Unicode name; null bytes are rejected.
                outputPsdName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+\.psd$'
                  description: Plain versioned PSD name distinct from the original; existing files are never overwritten.
                outputPreviewName:
                  type: string
                  minLength: 5
                  maxLength: 255
                  pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)[^\\/\x00-\x1F<>:"|?*]+\.png$'
                  description: Plain versioned PNG name in the local working folder; existing files are never overwritten.
            example:
              documentName: RWCMatchCard.psd
              edits:
                - layerId: 100
                  newName: SHOW LOGO - SMART OBJECT
              outputPsdName: RWCMatchCard_Renamed_v1.psd
              outputPreviewName: RWCMatchCard_Renamed_v1.png
      responses:
        "202":
          description: Rename operation queued for local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/list-match-card-assets:
    post:
      operationId: listPhotoshopMatchCardAssets
      summary: List supported match-card files in the approved working folder
      description: >
        Queue a read-only, non-recursive inventory of the approved local working
        folder. The result contains safe file metadata and plain filenames, never
        full local paths. No local confirmation is required. A successful status
        result follows MatchCardAssetInventoryResult.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyObject"
            example: {}
      responses:
        "202":
          description: Read-only asset inventory queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/plan-match-card:
    post:
      operationId: planPhotoshopMatchCard
      summary: Validate and plan a complete match card without editing Photoshop
      description: >
        Validate existing local assets, Bale CC, semantic layers, text mappings,
        and new output names. The template PNG must already be in the approved
        working folder. Planning is read-only and needs no local confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchCardRequest"
      responses:
        "202":
          description: Read-only match-card plan queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/create-match-card:
    post:
      operationId: createPhotoshopMatchCard
      summary: Build an editable match card from verified local assets
      description: >
        Queue one transactional Photoshop write using an existing local template
        PNG and supplied production assets. Bale CC is mandatory. The user must
        type exact YES in the PowerShell agent before execution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchCardRequest"
      responses:
        "202":
          description: Match-card creation queued for exact local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/update-match-card:
    post:
      operationId: updatePhotoshopMatchCard
      summary: Create a versioned update using a match-card manifest
      description: >
        Queue a transactional semantic-role update from an existing local
        manifest. Prior outputs and Bale CC are preserved. New PSD, PNG, and
        manifest names are required, followed by exact YES in the PowerShell agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatchCardRequest"
      responses:
        "202":
          description: Match-card update queued for exact local approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedJob"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/jobs/{jobId}:
    get:
      operationId: getPhotoshopJobStatus
      summary: Get the current status and result of a Photoshop job
      description: Return job state and result. For a write job, call only after the user confirms local approval is complete.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    EmptyObject:
      type: object
      additionalProperties: false

    PlainFileName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: '^(?!\.)(?!.*\.\.)(?![A-Za-z]:)(?![A-Za-z][A-Za-z0-9+.-]*:)(?!(?:[Cc][Oo][Nn]|[Pp][Rr][Nn]|[Aa][Uu][Xx]|[Nn][Uu][Ll]|[Cc][Oo][Mm][1-9]|[Ll][Pp][Tt][1-9])(?:\.|$))[^\\/\x00-\x1F<>:"|?*]+$'
      description: Plain top-level working-folder filename; no path, URL, data URI, traversal, control character, or reserved device name.

    SupportedAssetFileName:
      allOf:
        - $ref: "#/components/schemas/PlainFileName"
        - type: string
          pattern: '[^. ]\.(?:[Pp][Nn][Gg]|[Jj][Pp][Gg]|[Jj][Pp][Ee][Gg]|[Pp][Ss][Dd]|[Tt][Ii][Ff]|[Tt][Ii][Ff][Ff])$'
      description: Existing PNG, JPEG, PSD, or TIFF file in the approved working folder.

    TemplateBackgroundFileName:
      allOf:
        - $ref: "#/components/schemas/PlainFileName"
        - type: string
          pattern: '[^. ]\.[Pp][Nn][Gg]$'
      description: Existing blank template PNG manually saved in the approved working folder.

    PsdFileName:
      allOf:
        - $ref: "#/components/schemas/PlainFileName"
        - type: string
          pattern: '[^. ]\.[Pp][Ss][Dd]$'
      description: Plain PSD filename in the approved working folder.

    PsdOutputFileName:
      allOf:
        - $ref: "#/components/schemas/PsdFileName"
      description: New versioned PSD filename; an existing file is never overwritten.

    PngOutputFileName:
      allOf:
        - $ref: "#/components/schemas/PlainFileName"
        - type: string
          pattern: '[^. ]\.[Pp][Nn][Gg]$'
      description: New versioned PNG filename; an existing file is never overwritten.

    ManifestFileName:
      allOf:
        - $ref: "#/components/schemas/PlainFileName"
        - type: string
          pattern: '[^. ]\.[Mm][Aa][Tt][Cc][Hh][Cc][Aa][Rr][Dd]\.[Jj][Ss][Oo][Nn]$'
      description: Plain match-card manifest filename in the approved working folder.

    MatchCardAssetMetadata:
      type: object
      additionalProperties: false
      required:
        - fileName
        - extension
        - fileSizeBytes
        - width
        - height
        - isPsd
        - isPngOrJpeg
        - suggestedRole
        - matchesConfiguredBaleCcPackage
        - appearsSuitableAsTemplateBackground
      properties:
        fileName:
          $ref: "#/components/schemas/SupportedAssetFileName"
        extension:
          type: string
          enum: [.png, .jpg, .jpeg, .psd, .tif, .tiff]
        fileSizeBytes:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        width:
          type: [number, "null"]
          minimum: 0
        height:
          type: [number, "null"]
          minimum: 0
        isPsd:
          type: boolean
        isPngOrJpeg:
          type: boolean
        suggestedRole:
          enum:
            - competitorLeft
            - competitorRight
            - competitorCenter
            - showLogo
            - promotionLogo
            - championshipLogo
            - beltImage
            - sponsorLogo
            - venueLogo
            - suppliedCharacterArtwork
            - suppliedPhotograph
            - baleCcPackage
            - templateBackground
            - null
        matchesConfiguredBaleCcPackage:
          type: boolean
        appearsSuitableAsTemplateBackground:
          type: boolean

    MatchCardAssetInventoryResult:
      type: object
      additionalProperties: false
      required:
        - assets
        - baleCcConfigured
        - baleCcPackageFileName
        - supportedExtensions
        - recursive
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/MatchCardAssetMetadata"
        baleCcConfigured:
          type: boolean
        baleCcPackageFileName:
          oneOf:
            - $ref: "#/components/schemas/PsdFileName"
            - type: "null"
          description: Configured Bale CC package filename when available; never a local path.
        supportedExtensions:
          type: array
          minItems: 6
          maxItems: 6
          prefixItems:
            - const: .png
            - const: .jpg
            - const: .jpeg
            - const: .psd
            - const: .tif
            - const: .tiff
          items: false
        recursive:
          const: false

    RgbColor:
      type: object
      additionalProperties: false
      required: [red, green, blue]
      properties:
        red:
          type: integer
          minimum: 0
          maximum: 255
        green:
          type: integer
          minimum: 0
          maximum: 255
        blue:
          type: integer
          minimum: 0
          maximum: 255

    MatchCardCanvas:
      type: object
      additionalProperties: false
      required: [width, height, resolution]
      description: Width times height must not exceed 40,000,000 pixels.
      properties:
        width:
          type: integer
          minimum: 320
          maximum: 8192
        height:
          type: integer
          minimum: 320
          maximum: 8192
        resolution:
          type: integer
          minimum: 36
          maximum: 600

    TemplateBackground:
      type: object
      additionalProperties: false
      required: [fileName]
      properties:
        fileName:
          $ref: "#/components/schemas/TemplateBackgroundFileName"
        fitMode:
          type: string
          enum: [contain, cover]
          default: cover

    FontPreferences:
      type: object
      additionalProperties: false
      minProperties: 1
      description: Optional installed-font preferences. Unavailable fonts produce warnings and safe fallbacks.
      properties:
        mainTitle:
          $ref: "#/components/schemas/FontName"
        championshipLabel:
          $ref: "#/components/schemas/FontName"
        competitorNames:
          $ref: "#/components/schemas/FontName"
        stipulation:
          $ref: "#/components/schemas/FontName"
        date:
          $ref: "#/components/schemas/FontName"
        time:
          $ref: "#/components/schemas/FontName"
        venue:
          $ref: "#/components/schemas/FontName"

    FontName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: '^[^\x00-\x1F\x7F]+$'

    EccwArtDirectionShadow:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        opacity:
          type: number
          minimum: 0
          maximum: 60
        distance:
          type: number
          minimum: 0
          maximum: 40
        blur:
          type: number
          minimum: 0
          maximum: 40

    EccwArtDirectionStroke:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        color:
          $ref: "#/components/schemas/RgbColor"
        size:
          type: number
          minimum: 0
          maximum: 8
        opacity:
          type: number
          minimum: 0
          maximum: 100

    EccwCompetitorArtDirection:
      type: object
      additionalProperties: false
      properties:
        scale:
          type: number
          minimum: 0.75
          maximum: 2.25
        xOffset:
          type: number
          minimum: -300
          maximum: 300
        yOffset:
          type: number
          minimum: -250
          maximum: 250
        cutoffY:
          type: number
          minimum: 700
          maximum: 950
        headTargetY:
          type: number
          minimum: 100
          maximum: 500
        shadowOpacity:
          type: number
          minimum: 0
          maximum: 60
        shadowDistance:
          type: number
          minimum: 0
          maximum: 40
        brightness:
          type: integer
          minimum: -100
          maximum: 100
        contrast:
          type: integer
          minimum: -100
          maximum: 100

    EccwNameplateArtDirection:
      type: object
      additionalProperties: false
      properties:
        targetWidthOccupancy:
          type: number
          minimum: 0.5
          maximum: 0.95
          default: 0.82
        targetHeightOccupancy:
          type: number
          minimum: 0.3
          maximum: 0.9
          default: 0.6
        minimumHorizontalPadding:
          type: number
          minimum: 20
          maximum: 120
          default: 30
        maximumFontSize:
          type: number
          minimum: 36
          maximum: 120
        minimumFontSize:
